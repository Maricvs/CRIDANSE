name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Уведомление в Telegram о старте
        run: |
          cd ${{ github.workspace }}
          python3 tools/notifier-bot/telegram.py "🙈 Начался деплой на сервер"

      - name: Deploy to server по SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /var/www/unlim-mind-ai || {
              python3 tools/notifier-bot/telegram.py "❌ Ошибка: не удалось перейти в директорию проекта"
              exit 1
            }

            git reset --hard HEAD
            git clean -fd
            git pull origin main

            cd frontend

            if ! npm install; then
              python3 ../tools/notifier-bot/telegram.py "❌ Ошибка при npm install"
              exit 1
            fi

            # Запуск тестов фронтенда
            if ! npm run test:all >frontend_tests.log 2>&1; then
              test_output=$(tail -n 20 frontend_tests.log)
              python3 ../tools/notifier-bot/telegram.py "❌ Тесты фронтенда не пройдены:<br><pre>$test_output</pre>"
              exit 1
            fi

            if ! npm run build >build_output.log 2>&1; then
              error_log=$(tail -n 10 build_output.log)
              python3 ../tools/notifier-bot/telegram.py "❌ Сборка не удалась:<br>$error_log"
              exit 1
            fi

            sudo rm -rf /var/www/react-app/* || {
              python3 ../tools/notifier-bot/telegram.py "❌ Ошибка при очистке директории деплоя"
              exit 1
            }

            sudo cp -r dist/* /var/www/react-app/ || {
              python3 ../tools/notifier-bot/telegram.py "❌ Ошибка при копировании билда"
              exit 1
            }

            sudo chown -R www-data:www-data /var/www/react-app
            sudo chmod -R 755 /var/www/react-app

            cd ../backend
            source venv/bin/activate

            # Запуск тестов бэкенда
            if ! SERVER_ENV=production python3 -m pytest tests/test_api.py -v >backend_tests.log 2>&1; then
              test_output=$(tail -n 20 backend_tests.log)
              python3 ../tools/notifier-bot/telegram.py "❌ Тесты бэкенда не пройдены:<br><pre>$test_output</pre>"
              exit 1
            fi

            # Запуск тестов подключения к БД
            if ! python3 test_db.py >db_tests.log 2>&1; then
              test_output=$(tail -n 20 db_tests.log)
              python3 ../tools/notifier-bot/telegram.py "❌ Тесты подключения к БД не пройдены:<br><pre>$test_output</pre>"
              exit 1
            fi

            deactivate

            if ! sudo systemctl restart nginx; then
              python3 ../tools/notifier-bot/telegram.py "❌ Ошибка при рестарте nginx"
              exit 1
            fi

            if ! sudo systemctl restart unlim-api; then
              python3 ../tools/notifier-bot/telegram.py "❌ Ошибка при рестарте backend"
              exit 1
            fi

      - name: Уведомление об окончании деплоя
        run: |
          cd ${{ github.workspace }}
          python3 tools/notifier-bot/telegram.py "🍌 Деплой завершён успешно!"

  monitor:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Проверка сервисов на сервере
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /var/www/unlim-mind-ai

            if ! systemctl is-active --quiet unlim-api; then
              python3 tools/notifier-bot/telegram.py "❌ Backend (unlim-api) упал!"
            fi

            if ! systemctl is-active --quiet nginx; then
              python3 tools/notifier-bot/telegram.py "❌ Nginx не работает!"
            fi

            if systemctl is-active --quiet unlim-api && systemctl is-active --quiet nginx; then
              python3 tools/notifier-bot/telegram.py "🐒 Все сервисы работают! _______________"
            fi
