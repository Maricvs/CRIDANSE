name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Уведомление в Telegram о старте
        run: |
          cd ${{ github.workspace }}
          python3 tools/notifier-bot/telegram.py "🚀 Начался деплой на сервер"

      - name: Deploy to server по SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /var/www/unlim-mind-ai
            git pull origin main

            cd frontend
            npm install
            npm run build

            sudo rm -rf /var/www/react-app/*
            sudo cp -r dist/* /var/www/react-app/
            sudo chown -R www-data:www-data /var/www/react-app
            sudo chmod -R 755 /var/www/react-app

            sudo systemctl restart nginx
            sudo systemctl restart unlim-api

      - name: Уведомление об окончании деплоя
        run: |
          cd ${{ github.workspace }}
          python3 tools/notifier-bot/telegram.py "✅ Деплой завершён успешно!"

  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка сервисов на сервере
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /var/www/unlim-mind-ai

            if ! systemctl is-active --quiet unlim-api; then
              python3 tools/notifier-bot/telegram.py "❌ Backend (unlim-api) упал!"
            fi

            if ! systemctl is-active --quiet nginx; then
              python3 tools/notifier-bot/telegram.py "❌ Nginx не работает!"
            fi

            if systemctl is-active --quiet unlim-api && systemctl is-active --quiet nginx; then
              python3 tools/notifier-bot/telegram.py "✅ Все сервисы работают!"
            fi

  cron-job-notifications:
    runs-on: ubuntu-latest

    steps:
      - name: Выполнить бэкап и отправить уведомления (на сервере)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /var/www/unlim-mind-ai

            python3 tools/notifier-bot/telegram.py "🚀 Начался бэкап базы данных"

            if tar -czf /var/backups/db_backup_$(date +%F).tar.gz /var/www/unlim-mind-ai/db; then
              python3 tools/notifier-bot/telegram.py "✅ Бэкап завершён успешно"
            else
              python3 tools/notifier-bot/telegram.py "❌ Ошибка при бэкапе!"
            fi
